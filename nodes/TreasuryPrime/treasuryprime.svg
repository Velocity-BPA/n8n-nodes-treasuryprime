<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="tpGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D2137;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8962E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="30" cy="30" r="28" fill="url(#tpGradient)" stroke="#D4AF37" stroke-width="2"/>
  
  <!-- Bank building icon -->
  <!-- Roof/Triangle -->
  <polygon points="30,12 14,24 46,24" fill="url(#goldGradient)"/>
  
  <!-- Pediment line -->
  <rect x="13" y="24" width="34" height="3" fill="#D4AF37"/>
  
  <!-- Columns -->
  <rect x="16" y="27" width="4" height="16" fill="#FFFFFF" rx="1"/>
  <rect x="24" y="27" width="4" height="16" fill="#FFFFFF" rx="1"/>
  <rect x="32" y="27" width="4" height="16" fill="#FFFFFF" rx="1"/>
  <rect x="40" y="27" width="4" height="16" fill="#FFFFFF" rx="1"/>
  
  <!-- Base -->
  <rect x="12" y="43" width="36" height="4" fill="url(#goldGradient)" rx="1"/>
  
  <!-- TP letters stylized as vault door lines -->
  <circle cx="30" cy="35" r="5" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
  <line x1="30" y1="30" x2="30" y2="33" stroke="#D4AF37" stroke-width="1.5"/>
  <line x1="30" y1="37" x2="30" y2="40" stroke="#D4AF37" stroke-width="1.5"/>
</svg>
